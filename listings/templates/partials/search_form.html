<form action="{% url 'listings_page' %}" method="get" class="search-panel">
  <input type="hidden" name="vehicle_segment" value="{{ vehicle_segment|default:'all' }}">
  <input type="hidden" name="q" value="{{ values.q|default:'' }}">
  <button
    class="search-toggle-btn d-block d-md-none"
    type="button"
    data-toggle="collapse"
    data-target="#mobileSearchFilters"
    aria-expanded="false"
    aria-controls="mobileSearchFilters">
    Search &amp; Filter Options
  </button>

  <div id="mobileSearchFilters" class="collapse d-md-block">
  <div class="search-grid">
    <div class="search-item">
      <label for="car_make" class="sr-only">Car make</label>
      <input id="car_make" name="car_make" type="text" placeholder="Car Make" value="{{ values.car_make|default:'' }}">
    </div>
    <div class="search-item">
      <label for="car_model" class="sr-only">Car type</label>
      <input id="car_model" name="car_model" type="text" placeholder="Car Type" value="{{ values.car_model|default:'' }}">
    </div>
    <div class="search-item">
      <label for="fuel_type" class="sr-only">Fuel type</label>
      <select id="fuel_type" name="fuel_type">
        <option value="">Fuel Type</option>
        {% for fuel in fuel_types %}
          <option value="{{ fuel }}" {% if values.fuel_type == fuel %}selected{% endif %}>{{ fuel }}</option>
        {% endfor %}
      </select>
    </div>
    <div class="search-item">
      <label for="transmission" class="sr-only">Transmission</label>
      <select id="transmission" name="transmission">
        <option value="">Transmission</option>
        {% for trans in transmission_types %}
          <option value="{{ trans }}" {% if values.transmission == trans %}selected{% endif %}>{{ trans }}</option>
        {% endfor %}
      </select>
    </div>
    <div class="search-item">
      <label for="year_from" class="sr-only">From year</label>
      <input id="year_from" name="year_from" type="number" placeholder="From Year" value="{{ values.year_from|default:'' }}">
    </div>
    <div class="search-item">
      <label for="year_to" class="sr-only">To year</label>
      <input id="year_to" name="year_to" type="number" placeholder="To Year" value="{{ values.year_to|default:'' }}">
    </div>
    <div class="search-item">
      <label for="mileage_min" class="sr-only">Minimum mileage</label>
      <input id="mileage_min" name="mileage_min" type="number" placeholder="Min. Mileage" value="{{ values.mileage_min|default:'' }}">
    </div>
    <div class="search-item">
      <label for="mileage_max" class="sr-only">Maximum mileage</label>
      <input id="mileage_max" name="mileage_max" type="number" placeholder="Max. Mileage" value="{{ values.mileage_max|default:'' }}">
    </div>
    <div class="search-item">
      <label for="price_min" class="sr-only">Minimum price</label>
      <input id="price_min" name="price_min" type="number" placeholder="Min. Price" value="{{ values.price_min|default:'' }}">
    </div>
    <div class="search-item">
      <label for="price_max" class="sr-only">Maximum price</label>
      <input id="price_max" name="price_max" type="number" placeholder="Max. Price" value="{{ values.price_max|default:'' }}">
    </div>
    <div class="search-item">
      <label for="sort" class="sr-only">Sort by</label>
      <select id="sort" name="sort">
        <option value="car_make" {% if sort == 'car_make' or not sort %}selected{% endif %}>Sort: Car Make (A-Z)</option>
        <option value="price" {% if sort == 'price' %}selected{% endif %}>Price</option>
        <option value="year" {% if sort == 'year' %}selected{% endif %}>Year</option>
        <option value="date_added" {% if sort == 'date_added' %}selected{% endif %}>Date Added</option>
      </select>
    </div>
    <div class="search-item search-actions">
      <button type="submit">Search</button>
    </div>
    <div class="search-item search-actions">
      <a href="{% url 'listings_page' %}">Reset</a>
    </div>
  </div>
  </div>
</form>
